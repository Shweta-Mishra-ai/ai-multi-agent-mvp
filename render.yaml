# Render blueprint: deploy AgentOS with one click
# (Render dashboard -> New -> Blueprint -> point at this repo, pick this branch).
#
# One service, one URL: the React web UI and the HTTP API are served
# from the same FastAPI process (the UI is a static build mounted at
# "/", the API lives at /health, /agents, /run, /execute, /auth/*) - no
# separate frontend service or CORS setup needed for the bundled deploy.
#
# Required secret (set in the Render dashboard when prompted):
#   OPENAI_API_KEY   — works with ANY OpenAI-compatible provider's key,
#                      not only OpenAI's (e.g. a free Groq or Gemini key).
#
# If using a non-OpenAI provider, also edit AGENTOS_MODEL below and set
# OPENAI_BASE_URL, e.g. for Groq:
#   AGENTOS_MODEL      = llama-3.3-70b-versatile
#   OPENAI_BASE_URL    = https://api.groq.com/openai/v1
#
# Optional secrets:
#   TAVILY_API_KEY (better web search), SMTP_* (real email sending)
#
# NOTE: on the free plan storage is ephemeral — memory (SQLite) resets on
# each deploy/restart. Upgrade the plan and attach a disk at /data for
# persistence.

services:
  - type: web
    name: agentos
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false          # prompted securely in the dashboard, never in git
      - key: OPENAI_BASE_URL
        value: ""             # leave empty for OpenAI; set for Groq/Gemini/etc.
      - key: TAVILY_API_KEY
        sync: false
      - key: AGENTOS_MODEL
        value: gpt-4o-mini    # e.g. llama-3.3-70b-versatile for Groq
      - key: AGENTOS_RATE_LIMIT_PER_MIN
        value: "10"
